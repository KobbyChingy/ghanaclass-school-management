services:
  postgres:
    image: postgres:16
    container_name: ghanaclass-postgres
    environment:
      POSTGRES_DB: ghanaclass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ghanaclass_pgdata:/var/lib/postgresql/data

volumes:
  ghanaclass_pgdata:
